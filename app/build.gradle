apply plugin: 'com.android.application'

android {
    namespace "com.mojang.minecraftpe.platforms"
    compileSdk 35
    ndkVersion "29.0.14206865"

    defaultConfig {
        applicationId "com.mojang.minecraftpe.platforms"
        minSdk 21
        targetSdk 35
        versionCode 1
        versionName "1.0"
        ndk {
            abiFilters 'armeabi-v7a', 'arm64-v8a'
        }
        signingConfig signingConfigs.debug
    }
    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
        debug {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }
    externalNativeBuild {
        ndkBuild {
            path file('src/main/jni/Android.mk')
        }
    }
}
